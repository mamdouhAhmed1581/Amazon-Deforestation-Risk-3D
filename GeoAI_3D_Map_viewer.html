<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GeoAI 3D Map</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html,body { width:100%; height:100%; background:#0a0f1e; overflow:hidden;
                font-family:'Inter','Segoe UI',sans-serif; color:#e2e8f0; }

    /* ─── Loading overlay ─── */
    #loading {
      position:fixed; inset:0; z-index:99;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      background:#0a0f1e; transition:opacity .6s ease;
    }
    #loading.gone { opacity:0; pointer-events:none; }

    .lbl   { font-size:11px; letter-spacing:5px; color:#3b82f6; margin-bottom:20px; text-transform:uppercase; }
    .ttl   { font-size:24px; font-weight:700; margin-bottom:36px; }
    .track { width:260px; height:3px; background:rgba(59,130,246,.15); border-radius:2px; overflow:hidden; }
    .fill  { height:100%; background:linear-gradient(90deg,#3b82f6,#06b6d4);
             border-radius:2px; width:5%; transition:width .5s ease; }
    .sub   { margin-top:18px; font-size:12px; color:#64748b; }

    /* ─── Error card ─── */
    #err-card {
      display:none; margin-top:32px; background:rgba(239,68,68,.1);
      border:1px solid rgba(239,68,68,.3); border-radius:12px;
      padding:20px 28px; max-width:440px; text-align:center; line-height:1.7;
    }
    #err-card h3 { color:#ef4444; margin-bottom:10px; }
    #err-card p  { font-size:13px; color:#94a3b8; }
    #err-card a  { color:#3b82f6; }

    /* ─── iframe ─── */
    #frame { width:100%; height:100%; border:none; display:block; }
  </style>
</head>
<body>

<div id="loading">
  <div class="lbl">KEPLER.GL · 3D</div>
  <div class="ttl">GeoAI 3D Map</div>
  <div class="track"><div id="fill" class="fill"></div></div>
  <div class="sub"  id="sub">Initialising…</div>

  <div id="err-card">
    <h3>⚠ Servers needs to be running</h3>
    <p>
      The 3D map requires a local web server.<br>
      Please <strong>open a terminal</strong> in the project folder and run:<br><br>
      <code style="background:rgba(255,255,255,.05);padding:4px 10px;border-radius:6px;font-size:13px;">node server.js</code><br><br>
      Then open <a href="http://127.0.0.1:5500" target="_blank">http://127.0.0.1:5500</a> in your browser.
      <br><br>
      Or if Live Server is running in VS Code, click
      <a href="#" onclick="location.reload();return false;">Retry</a>.
    </p>
  </div>
</div>

<iframe id="frame" src="" title="GeoAI 3D Interactive Map"
        allow="fullscreen" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>

<script>
(function(){
  var fill  = document.getElementById('fill');
  var sub   = document.getElementById('sub');
  var errCard = document.getElementById('err-card');
  var loading = document.getElementById('loading');
  var frame   = document.getElementById('frame');

  /* Animate progress bar */
  var prog = [
    [20,  'Loading scene data…',   300],
    [45,  'Building 3D layers…',   900],
    [70,  'Rendering geometry…',   1800],
    [88,  'Almost ready…',         2800]
  ];
  prog.forEach(function(p){
    setTimeout(function(){ fill.style.width=p[0]+'%'; sub.textContent=p[1]; }, p[2]);
  });

  /* Try fetch first (works when a server is running) */
  fetch('GeoAI_3D_Map.html', { method:'HEAD' })
    .then(function(r){
      if(!r.ok) throw new Error('HTTP '+r.status);
      /* Server is there – load in iframe */
      frame.src = 'GeoAI_3D_Map.html';
    })
    .catch(function(){
      /* No server – show instructions */
      fill.style.background = '#ef4444';
      fill.style.width = '100%';
      sub.textContent = 'Server not detected';
      errCard.style.display = 'block';
    });

  /* Hide overlay when iframe finishes loading */
  frame.addEventListener('load', function(){
    if(!frame.src) return;         // ignore initial empty src
    fill.style.width = '100%';
    setTimeout(function(){ loading.classList.add('gone'); }, 800);
  });
})();
</script>
</body>
</html>
